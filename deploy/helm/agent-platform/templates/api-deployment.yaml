{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-platform.fullname" . }}-api
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-platform.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "agent-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "agent-platform.fullname" . }}-api
      containers:
        - name: api
          image: {{ include "agent-platform.image" (dict "Values" .Values "component" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: API_LISTEN_ADDR
              value: ":8080"
            - name: DATABASE_URL
              value: {{ .Values.postgres.url | quote }}
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            {{- if eq .Values.auth.mode "workos" }}
            - name: WORKOS_CLIENT_ID
              value: {{ .Values.auth.workos.clientId | quote }}
            - name: WORKOS_JWKS_URL
              value: {{ .Values.auth.workos.jwksUrl | quote }}
            {{- if .Values.auth.workos.apiKeySecretName }}
            - name: WORKOS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.workos.apiKeySecretName }}
                  key: apiKey
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-platform.fullname" . }}-api
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "agent-platform.name" . }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agent-platform.fullname" . }}-api
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent-platform.fullname" . }}-api
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent-platform.fullname" . }}-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agent-platform.fullname" . }}-api
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-platform.fullname" . }}-api
    namespace: {{ .Release.Namespace }}
{{- end }}
