apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentruns.ailab.uipath.com
spec:
  group: ailab.uipath.com
  names:
    kind: AgentRun
    listKind: AgentRunList
    plural: agentruns
    singular: agentrun
    shortNames: ["arun"]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [tenantId, agentName, image]
              properties:
                tenantId: { type: string }
                agentName: { type: string }
                image: { type: string }
                inputs: { type: string }
                env:
                  type: object
                  additionalProperties: { type: string }
                secrets:
                  type: array
                  items: { type: string }
                secretRef: { type: string }
                cpu: { type: string }
                memory: { type: string }
                timeout: { type: string }
                traceId: { type: string }
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Succeeded, Failed]
                jobName: { type: string }
                startedAt: { type: string, format: date-time }
                endedAt: { type: string, format: date-time }
                exitCode: { type: integer }
                message: { type: string }
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agentName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
