apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentdeployments.ailab.uipath.com
spec:
  group: ailab.uipath.com
  names:
    kind: AgentDeployment
    listKind: AgentDeploymentList
    plural: agentdeployments
    singular: agentdeployment
    shortNames: ["adep"]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [tenantId, agentName, image, port]
              properties:
                tenantId: { type: string }
                agentName: { type: string }
                image: { type: string }
                port: { type: integer }
                healthPath: { type: string }
                idleTimeout: { type: string }
                env:
                  type: object
                  additionalProperties: { type: string }
                secrets:
                  type: array
                  items: { type: string }
                secretRef: { type: string }
            status:
              type: object
              properties:
                url: { type: string }
                readyReplicas: { type: integer }
                message: { type: string }
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agentName
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
