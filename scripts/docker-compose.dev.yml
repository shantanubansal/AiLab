services:
  postgres:
    image: postgres:16-alpine
    container_name: ailab-postgres
    environment:
      POSTGRES_USER: ailab
      POSTGRES_PASSWORD: ailab
      POSTGRES_DB: ailab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailab -d ailab"]
      interval: 2s
      timeout: 5s
      retries: 20

  nats:
    image: nats:2.10-alpine
    container_name: ailab-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

volumes:
  postgres-data:
  nats-data:
