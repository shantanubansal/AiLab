name: release

# Tag-driven: pushing a SemVer tag like v0.2.0 builds and publishes:
#   * one OCI image per service to ghcr.io/<owner>/<service>:<tag>
#   * the Helm chart to ghcr.io/<owner>/charts/agent-platform:<tag> (OCI)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, controller, builder, gateway, triggers]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ailab-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ github.ref_name }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  chart:
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: package chart
        id: pkg
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/agent-platform --version "$version" --app-version "$version"
          echo "file=agent-platform-${version}.tgz" >> "$GITHUB_OUTPUT"

      - name: push chart to ghcr
        run: helm push ${{ steps.pkg.outputs.file }} oci://ghcr.io/${{ github.repository_owner }}/charts
