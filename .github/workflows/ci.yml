name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref so we don't waste minutes on
# superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: lint base
        run: helm lint deploy/helm/agent-platform
      - name: lint saas
        run: helm lint deploy/helm/agent-platform -f deploy/helm/agent-platform/values-saas.yaml
      - name: lint selfhost
        run: helm lint deploy/helm/agent-platform -f deploy/helm/agent-platform/values-selfhost.yaml
      - name: render saas
        run: helm template ailab deploy/helm/agent-platform -f deploy/helm/agent-platform/values-saas.yaml >/dev/null
      - name: render selfhost
        run: helm template ailab deploy/helm/agent-platform -f deploy/helm/agent-platform/values-selfhost.yaml >/dev/null

  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml
      - name: install
        run: pip install -e ".[dev]"
      - name: pytest
        run: python -m pytest -v

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: install
        run: npm ci
      - name: build
        run: npm run build
      - name: test
        run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        run: npm ci
      - name: build
        run: npm run build

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: fmt
        run: terraform fmt -check -diff
      - name: init
        run: terraform init -backend=false
      - name: validate
        run: terraform validate
